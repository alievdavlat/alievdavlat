<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="420" height="420" fill="none" role="img" aria-label="Tech stack orbit">
  <title>Tech stack in orbit</title>
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#1035" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>.mono{font-family:'Cascadia Code','Fira Code','Consolas',monospace}
      @keyframes pulse {0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.9;transform:scale(1.08)}}
      #glow{transform-box:fill-box;transform-origin:center;animation:pulse 3s ease-in-out infinite}</style>
  </defs>

  <!-- ambient core glow -->
  <circle id="glow" cx="210" cy="210" r="70" fill="url(#core)" opacity="0.5"/>

    <circle cx="210" cy="210" r="78" fill="none" stroke="#1c3350" stroke-width="1" stroke-dasharray="2 5"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="16s" repeatCount="indefinite"/>
      <g transform="translate(210.0,132.0)">
        <g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="-360 0 0" dur="16s" repeatCount="indefinite"/>
          <rect x="-31" y="-16" width="62" height="32" rx="16" fill="#0c1a30" stroke="url(#ob)" stroke-width="1.5"/>
          <text x="0" y="5" text-anchor="middle" class="mono" font-size="12" font-weight="600" fill="#67e8f9">React</text>
        </g>
      </g>
      <g transform="translate(277.5,249.0)">
        <g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="-360 0 0" dur="16s" repeatCount="indefinite"/>
          <rect x="-29" y="-16" width="58" height="32" rx="16" fill="#0c1a30" stroke="url(#ob)" stroke-width="1.5"/>
          <text x="0" y="5" text-anchor="middle" class="mono" font-size="12" font-weight="600" fill="#67e8f9">Node</text>
        </g>
      </g>
      <g transform="translate(142.5,249.0)">
        <g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="-360 0 0" dur="16s" repeatCount="indefinite"/>
          <rect x="-22" y="-16" width="44" height="32" rx="16" fill="#0c1a30" stroke="url(#ob)" stroke-width="1.5"/>
          <text x="0" y="5" text-anchor="middle" class="mono" font-size="12" font-weight="600" fill="#67e8f9">TS</text>
        </g>
      </g>
    </g>

    <circle cx="210" cy="210" r="155" fill="none" stroke="#1c3350" stroke-width="1" stroke-dasharray="2 5"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="-360 210 210" dur="26s" repeatCount="indefinite"/>
      <g transform="translate(210.0,55.0)">
        <g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="26s" repeatCount="indefinite"/>
          <rect x="-31" y="-16" width="62" height="32" rx="16" fill="#0c1a30" stroke="url(#ob)" stroke-width="1.5"/>
          <text x="0" y="5" text-anchor="middle" class="mono" font-size="12" font-weight="600" fill="#67e8f9">Next.js</text>
        </g>
      </g>
      <g transform="translate(344.2,132.5)">
        <g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="26s" repeatCount="indefinite"/>
          <rect x="-31" y="-16" width="62" height="32" rx="16" fill="#0c1a30" stroke="url(#ob)" stroke-width="1.5"/>
          <text x="0" y="5" text-anchor="middle" class="mono" font-size="12" font-weight="600" fill="#67e8f9">NestJS</text>
        </g>
      </g>
      <g transform="translate(344.2,287.5)">
        <g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="26s" repeatCount="indefinite"/>
          <rect x="-32" y="-16" width="64" height="32" rx="16" fill="#0c1a30" stroke="url(#ob)" stroke-width="1.5"/>
          <text x="0" y="5" text-anchor="middle" class="mono" font-size="12" font-weight="600" fill="#67e8f9">Docker</text>
        </g>
      </g>
      <g transform="translate(210.0,365.0)">
        <g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="26s" repeatCount="indefinite"/>
          <rect x="-30" y="-16" width="60" height="32" rx="16" fill="#0c1a30" stroke="url(#ob)" stroke-width="1.5"/>
          <text x="0" y="5" text-anchor="middle" class="mono" font-size="12" font-weight="600" fill="#67e8f9">Strapi</text>
        </g>
      </g>
      <g transform="translate(75.8,287.5)">
        <g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="26s" repeatCount="indefinite"/>
          <rect x="-37" y="-16" width="74" height="32" rx="16" fill="#0c1a30" stroke="url(#ob)" stroke-width="1.5"/>
          <text x="0" y="5" text-anchor="middle" class="mono" font-size="12" font-weight="600" fill="#67e8f9">Postgres</text>
        </g>
      </g>
      <g transform="translate(75.8,132.5)">
        <g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="26s" repeatCount="indefinite"/>
          <rect x="-34" y="-16" width="68" height="32" rx="16" fill="#0c1a30" stroke="url(#ob)" stroke-width="1.5"/>
          <text x="0" y="5" text-anchor="middle" class="mono" font-size="12" font-weight="600" fill="#67e8f9">GraphQL</text>
        </g>
      </g>
    </g>

  <!-- core -->
  <circle cx="210" cy="210" r="40" fill="#0c1a30" stroke="url(#ob)" stroke-width="2" filter="url(#g)"/>
  <text x="210" y="219" text-anchor="middle" class="mono" font-size="26" font-weight="800" fill="#67e8f9">&lt;/&gt;</text>
</svg>
